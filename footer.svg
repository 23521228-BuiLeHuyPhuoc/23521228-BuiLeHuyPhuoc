<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 100" width="860" height="100">
  <defs>
    <linearGradient id="footerAccent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#00C8FF"/>
      <stop offset="50%"  stop-color="#7B5FE8"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="scanFooter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7B5FE8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#7B5FE8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B5FE8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fdots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="100" fill="#0D1117"/>
  <rect width="860" height="100" fill="url(#fdots)"/>

  <!-- Animated scan sweep -->
  <rect x="-860" y="0" width="860" height="100" fill="url(#scanFooter)">
    <animateTransform attributeName="transform" type="translate"
      values="-860,0; 860,0; 860,0"
      keyTimes="0; 0.6; 1"
      dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Top accent line — wipe in from left -->
  <rect x="0" y="0" width="0" height="2" rx="0" fill="url(#footerAccent)" opacity="0.7">
    <animate attributeName="width" values="0;860" dur="0.8s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Bracket top-left -->
  <path d="M20,18 L20,8 L34,8" fill="none" stroke="#00C8FF" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.4s" begin="0.7s" fill="freeze"/>
    <animate attributeName="stroke-dasharray" values="0,40; 40,0" dur="0.5s" begin="0.7s" fill="freeze"/>
  </path>
  <!-- Bracket top-right -->
  <path d="M840,18 L840,8 L826,8" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.4s" begin="0.9s" fill="freeze"/>
    <animate attributeName="stroke-dasharray" values="0,40; 40,0" dur="0.5s" begin="0.9s" fill="freeze"/>
  </path>

  <!-- Main text fade in -->
  <text x="430" y="50" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600"
        fill="#F0F6FF" opacity="0">
    Thanks for visiting!
    <animate attributeName="opacity" values="0;0.92" dur="0.6s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,8; 0,0" dur="0.6s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Subtext -->
  <text x="430" y="70" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#8892a4" letter-spacing="1" opacity="0">
    // keep coding &amp; keep growing
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.3s" fill="freeze"/>
  </text>

  <!-- Bottom short accent line — wipe from center -->
  <rect x="430" y="86" width="0" height="1.5" rx="1" fill="url(#footerAccent)" opacity="0.5">
    <animate attributeName="x" values="430;340" dur="0.5s" begin="1.5s" fill="freeze"/>
    <animate attributeName="width" values="0;180" dur="0.5s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- Pulse on the accent line -->
  <rect x="340" y="86" width="180" height="1.5" rx="1" fill="url(#footerAccent)">
    <animate attributeName="opacity" values="0;0.5;0.2;0.5;0.2;0.5" dur="3s" begin="2s" repeatCount="indefinite"/>
  </rect>
</svg>
