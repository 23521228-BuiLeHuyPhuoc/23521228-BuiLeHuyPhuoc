<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 110" width="860" height="110">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fline2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="860" height="110" fill="url(#fbg)"/>
  <rect width="860" height="110" fill="url(#fgrid)"/>
  <ellipse cx="430" cy="55" rx="300" ry="60" fill="#6366f1" opacity="0.04"/>

  <rect x="0" y="0" width="0" height="1" fill="url(#fline)">
    <animate attributeName="width" values="0;860" dur="0.7s" begin="0.1s" fill="freeze"/>
  </rect>
  <rect x="0" y="0" width="2" height="110" fill="#6366f1" opacity="0.25"/>
  <rect x="858" y="0" width="2" height="110" fill="#a78bfa" opacity="0.25"/>

  <text x="430" y="52"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', sans-serif"
    font-size="18" font-weight="400"
    fill="#e2e8f0" letter-spacing="0.3" opacity="0">
    Thanks for visiting!
    <animate attributeName="opacity" values="0;0.95" dur="0.5s" begin="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,6;0,0" dur="0.5s" begin="0.6s" fill="freeze"/>
  </text>

  <text x="430" y="74"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="11" font-weight="400"
    fill="#475569" letter-spacing="1.5" opacity="0">
    // keep coding &amp; keep growing
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.9s" fill="freeze"/>
  </text>

  <rect x="430" y="90" width="0" height="1" rx="0.5" fill="url(#fline)">
    <animate attributeName="x"     values="430;310" dur="0.5s" begin="1.1s" fill="freeze"/>
    <animate attributeName="width" values="0;240"   dur="0.5s" begin="1.1s" fill="freeze"/>
  </rect>
  <rect x="310" y="90" width="240" height="1" rx="0.5" fill="url(#fline2)">
    <animate attributeName="opacity" values="0;0;0.6;0.2;0.6;0.2;0.5" dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>
