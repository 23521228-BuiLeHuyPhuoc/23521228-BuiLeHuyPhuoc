<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#00C8FF"/>
      <stop offset="50%"  stop-color="#7B5FE8"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00C8FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00C8FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A855F7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity="0.045"/>
    </pattern>
    <mask id="scanMask">
      <rect width="860" height="220" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" fill="url(#headerBg)"/>
  <rect width="860" height="220" fill="url(#dots)"/>

  <!-- Animated scan line (horizontal sweep) -->
  <rect x="-860" y="0" width="860" height="220" fill="url(#glow1)" opacity="0.18">
    <animateTransform attributeName="transform" type="translate"
      values="-860,0; 860,0; 860,0"
      keyTimes="0; 0.55; 1"
      dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Bracket corners top-left — draw-in animation -->
  <path d="M32,52 L32,32 L56,32" fill="none" stroke="#00C8FF" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <animate attributeName="stroke-dasharray" values="0,60; 60,0" dur="1s" begin="0.2s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.7" dur="0.4s" begin="0.2s" fill="freeze"/>
  </path>
  <!-- Bracket corners top-right -->
  <path d="M828,52 L828,32 L804,32" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <animate attributeName="stroke-dasharray" values="0,60; 60,0" dur="1s" begin="0.4s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.7" dur="0.4s" begin="0.4s" fill="freeze"/>
  </path>
  <!-- Bracket corners bottom-left -->
  <path d="M32,168 L32,188 L56,188" fill="none" stroke="#00C8FF" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <animate attributeName="stroke-dasharray" values="0,60; 60,0" dur="1s" begin="0.6s" fill="freeze"/>
  </path>
  <!-- Bracket corners bottom-right -->
  <path d="M828,168 L828,188 L804,188" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <animate attributeName="stroke-dasharray" values="0,60; 60,0" dur="1s" begin="0.8s" fill="freeze"/>
  </path>

  <!-- Eyebrow — fade in -->
  <text x="430" y="68" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#00C8FF" letter-spacing="3" opacity="0">
    FULL-STACK JS / NODE.JS
    <animate attributeName="opacity" values="0;0.8" dur="0.6s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Main title — fade + slide up -->
  <text x="430" y="118" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700"
        fill="#F0F6FF" letter-spacing="-0.5" opacity="0">
    Bùi Lê Huy Phước
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,12; 0,0" dur="0.7s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Accent bar — wipe from center -->
  <rect x="300" y="130" width="0" height="2.5" rx="1.5" fill="url(#accentBar)">
    <animate attributeName="x" values="430;300" dur="0.6s" begin="1.1s" fill="freeze"/>
    <animate attributeName="width" values="0;260" dur="0.6s" begin="1.1s" fill="freeze"/>
  </rect>

  <!-- Tech stack pills — staggered fade in -->
  <!-- Node.js -->
  <g opacity="0">
    <rect x="154" y="148" width="72" height="22" rx="11" fill="#1a2e1a" stroke="#3FB950" stroke-width="1"/>
    <text x="190" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#3FB950" font-weight="600">Node.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.3s" fill="freeze"/>
  </g>
  <!-- TypeScript -->
  <g opacity="0">
    <rect x="236" y="148" width="86" height="22" rx="11" fill="#162032" stroke="#3178C6" stroke-width="1"/>
    <text x="279" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#3178C6" font-weight="600">TypeScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.45s" fill="freeze"/>
  </g>
  <!-- JavaScript -->
  <g opacity="0">
    <rect x="332" y="148" width="86" height="22" rx="11" fill="#1f1a00" stroke="#F7DF1E" stroke-width="1"/>
    <text x="375" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#F7DF1E" font-weight="600">JavaScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
  </g>
  <!-- React -->
  <g opacity="0">
    <rect x="428" y="148" width="60" height="22" rx="11" fill="#0d1f2d" stroke="#61DAFB" stroke-width="1"/>
    <text x="458" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#61DAFB" font-weight="600">React</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.75s" fill="freeze"/>
  </g>
  <!-- Next.js -->
  <g opacity="0">
    <rect x="498" y="148" width="68" height="22" rx="11" fill="#1a1a1a" stroke="#e2e2e2" stroke-width="1"/>
    <text x="532" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e2e2" font-weight="600">Next.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.9s" fill="freeze"/>
  </g>
  <!-- REST API -->
  <g opacity="0">
    <rect x="576" y="148" width="72" height="22" rx="11" fill="#1e0d2e" stroke="#A855F7" stroke-width="1"/>
    <text x="612" y="163" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#A855F7" font-weight="600">REST API</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.05s" fill="freeze"/>
  </g>

  <!-- Tagline — fade in last -->
  <text x="430" y="200" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        fill="#8892a4" letter-spacing="0.3" opacity="0">
    Building reliable web services &amp; full-stack JS applications
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.2s" fill="freeze"/>
  </text>

  <!-- Continuous pulse on left accent lines -->
  <line x1="44" y1="75" x2="80" y2="75" stroke="#00C8FF" stroke-width="1.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="44" y1="83" x2="64" y2="83" stroke="#00C8FF" stroke-width="1">
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="2.5s" begin="2.7s" repeatCount="indefinite"/>
  </line>
  <!-- Right accent lines -->
  <line x1="816" y1="75" x2="780" y2="75" stroke="#A855F7" stroke-width="1.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="816" y1="83" x2="796" y2="83" stroke="#A855F7" stroke-width="1">
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="2.5s" begin="2.7s" repeatCount="indefinite"/>
  </line>
</svg>
