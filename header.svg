<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" width="860" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="860" height="240" fill="url(#bg)"/>
  <rect width="860" height="240" fill="url(#grid)"/>
  <ellipse cx="160" cy="60" rx="200" ry="100" fill="#6366f1" opacity="0.06"/>
  <ellipse cx="700" cy="190" rx="180" ry="90" fill="#22d3ee" opacity="0.05"/>

  <rect x="0" y="0" width="860" height="1" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="2" height="240" fill="#6366f1" opacity="0.3"/>
  <rect x="858" y="0" width="2" height="240" fill="#a78bfa" opacity="0.3"/>

  <text x="430" y="62"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="10.5" font-weight="400"
    fill="#6366f1" letter-spacing="4" opacity="0">
    &lt; FULL-STACK DEVELOPER /&gt;
    <animate attributeName="opacity" values="0;0.9" dur="0.5s" begin="0.2s" fill="freeze"/>
  </text>

  <text x="430" y="122"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', sans-serif"
    font-size="44" font-weight="700"
    fill="#f1f5f9" letter-spacing="-1" opacity="0">
    Bùi Lê Huy Phước
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,10;0,0" dur="0.7s" begin="0.5s" fill="freeze"/>
  </text>

  <rect x="430" y="133" width="0" height="1" fill="url(#lineGrad)">
    <animate attributeName="x"     values="430;270" dur="0.55s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="width" values="0;320"   dur="0.55s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <g opacity="0">
    <rect x="160" y="152" width="78" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="199" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">Node.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.15s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="248" y="152" width="92" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="294" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">TypeScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.28s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="350" y="152" width="92" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="396" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">JavaScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.41s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="452" y="152" width="68" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="486" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">React</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.54s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="530" y="152" width="74" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="567" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">Next.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.67s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="614" y="152" width="82" height="26" rx="5" fill="url(#pillGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="655" y="169" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#a5b4fc">REST API</text>
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.80s" fill="freeze"/>
  </g>

  <text x="430" y="210"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', sans-serif"
    font-size="12.5" font-weight="300"
    fill="#94a3b8" letter-spacing="0.8" opacity="0">
    Building web services and full-stack applications with JavaScript
    <animate attributeName="opacity" values="0;0.85" dur="0.5s" begin="1.95s" fill="freeze"/>
  </text>

  <rect x="0" y="239" width="860" height="1" fill="url(#lineGrad2)" opacity="0.5"/>
</svg>
